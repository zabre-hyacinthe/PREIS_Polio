name: PREIS Polio Daily Pipeline

on:
  schedule:
    # 8h00 Afrique de l'Est (EAT = UTC+3)  ->  5h00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: preis-polio-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      ALERT_FROM: ${{ secrets.ALERT_FROM }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "465"
      PREIS_DRY_RUN: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libgdal-dev libudunits2-dev libproj-dev libgeos-dev libfontconfig1-dev

      - name: Install R packages
        run: |
          Rscript -e 'packages <- c("blastula","readr","dplyr","stringr","tibble","tidyr","purrr","lubridate","jsonlite","rvest","xml2","httr2","openssl"); missing <- packages[!vapply(packages, requireNamespace, logical(1), quietly = TRUE)]; if (length(missing) > 0) install.packages(missing, repos = "https://cloud.r-project.org")'

      - name: Run Polio cloud pipeline
        run: |
          Rscript R/120_run_polio_cloud.R

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/dashboard/ data/final/preis_common/ data/processed/ data/last_issue.txt || true
          if git diff --cached --quiet; then
            echo "No data change to commit."
          else
            git commit -m "Update PREIS Polio data [skip ci]"
            git push
          fi